name: Daily Financial News Agent

on:
  schedule:
    # Every day at 23:00 UTC (Beijing time 07:00 next day)
    - cron: "0 23 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # commit reports/ back to repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages (OIDC)

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: run the news pipeline and commit the .md report
  # ──────────────────────────────────────────────────────────────────────────
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so push works cleanly

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-${{ runner.os }}-paraphrase-multilingual-MiniLM-L12-v2
          restore-keys: hf-${{ runner.os }}-

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: news_agent.db
          key: newsdb-${{ runner.os }}-${{ github.run_number }}
          restore-keys: newsdb-${{ runner.os }}-

      - name: Run news agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FINNHUB_API_KEY:  ${{ secrets.FINNHUB_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
        run: python main.py

      - name: Commit daily report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
          git push

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: build static site and deploy to GitHub Pages
  # ──────────────────────────────────────────────────────────────────────────
  deploy-pages:
    runs-on: ubuntu-latest
    needs: run-agent          # wait for the .md file to be committed
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository (with fresh reports/)
        uses: actions/checkout@v4
        with:
          ref: main           # pull the commit just pushed by run-agent
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install markdown library
        run: pip install markdown==3.6

      - name: Build static site
        run: python build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site          # the directory build_site.py writes to

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
